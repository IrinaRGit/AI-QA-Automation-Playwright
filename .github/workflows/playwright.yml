name: Playwright Tests

on:
  push:
  workflow_dispatch:

jobs:
  playwright:
    name: Run Playwright
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: dev1

    env:
      CI: true
      # Use repository secrets; fall back to repository variables if names match .env
      DIDAXIS_URL: ${{ secrets.DIDAXIS_URL || vars.DIDAXIS_URL }}
      DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL || vars.DIDAXIS_EMAIL }}
      DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD || vars.DIDAXIS_PASSWORD }}
      DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN || vars.DIDAXIS_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Didaxis configuration
        shell: bash
        run: |
          missing=()
          for name in DIDAXIS_URL DIDAXIS_EMAIL DIDAXIS_PASSWORD DIDAXIS_API_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing: ${missing[*]}. Add them to the dev1 environment (or repo secrets) under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright ds1 create program test
        run: npx playwright test tests/ds1-create-program.spec.ts --project=chromium

      - name: Run Playwright ds1-pw positive test
        run: npx playwright test tests/ds1-pw/ds1-pw-positive.spec.ts --project=chromium

      - name: Run Playwright ds1-pw negative test
        run: npx playwright test tests/ds1-pw/ds1-pw-negative.spec.ts --project=chromium

      - name: Run Playwright ds1-pw edge test
        run: npx playwright test tests/ds1-pw/ds1-pw-edge.spec.ts --project=chromium

      - name: Run Playwright ds2-pw positive test
        run: npx playwright test tests/ds2-pw/ds2-pw-positive.spec.ts --project=chromium

      - name: Run Playwright ds2-pw negative test
        run: npx playwright test tests/ds2-pw/ds2-pw-negative.spec.ts --project=chromium

      - name: Run Playwright ds2-pw edge test
        run: npx playwright test tests/ds2-pw/ds2-pw-edge.spec.ts --project=chromium

      - name: Run Playwright ds3-pw positive test
        run: npx playwright test tests/ds3-pw/ds3-pw-positive.spec.ts --project=chromium

      - name: Run Playwright ds3-pw negative test
        run: npx playwright test tests/ds3-pw/ds3-pw-negative.spec.ts --project=chromium

      - name: Run Playwright ds3-pw edge test
        run: npx playwright test tests/ds3-pw/ds3-pw-edge.spec.ts --project=chromium

      - name: Run Playwright todomvc positive test
        run: npx playwright test tests/todomvc/positive.spec.ts --project=chromium-todomvc

      - name: Run Playwright todomvc negative test
        run: npx playwright test tests/todomvc/negative.spec.ts --project=chromium-todomvc

      - name: Run Playwright todomvc edge test
        run: npx playwright test tests/todomvc/edge.spec.ts --project=chromium-todomvc

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 14
