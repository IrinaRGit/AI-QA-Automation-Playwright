name: Playwright Tests

on:
  push:

jobs:
  playwright:
    name: Run Playwright
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: dev1

    env:
      CI: true
      # Use repository secrets; fall back to repository variables if names match .env
      DIDAXIS_URL: ${{ secrets.DIDAXIS_URL || vars.DIDAXIS_URL }}
      DIDAXIS_EMAIL: ${{ secrets.DIDAXIS_EMAIL || vars.DIDAXIS_EMAIL }}
      DIDAXIS_PASSWORD: ${{ secrets.DIDAXIS_PASSWORD || vars.DIDAXIS_PASSWORD }}
      DIDAXIS_API_TOKEN: ${{ secrets.DIDAXIS_API_TOKEN || vars.DIDAXIS_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Didaxis configuration
        shell: bash
        run: |
          missing=()
          for name in DIDAXIS_URL DIDAXIS_EMAIL DIDAXIS_PASSWORD DIDAXIS_API_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing: ${missing[*]}. Add them under Settings → Secrets and variables → Actions (Secrets recommended for passwords/tokens)."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 14
